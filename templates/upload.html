<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Secure Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin: 0; padding: 0; color: #333; }
    .container { max-width: 800px; margin: 50px auto; background: #fff; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 40px; }
    h1 { text-align: center; color: #4a5568; margin-bottom: 30px; font-size: 2.5em; }
    form { display: flex; flex-direction: column; gap: 20px; }
    label { font-weight: bold; color: #2d3748; display: flex; align-items: center; gap: 10px; }
    input[type="file"], input[type="password"], input[type="number"] { padding: 12px; border: 2px solid #e2e8f0; border-radius: 5px; font-size: 1em; transition: border-color 0.3s; }
    input[type="file"]:focus, input[type="password"]:focus, input[type="number"]:focus { border-color: #667eea; outline: none; }
    .checkbox-label { display: flex; align-items: center; gap: 10px; font-weight: normal; }
    button { background: #667eea; color: #fff; border: none; padding: 15px; border-radius: 5px; font-size: 1.2em; cursor: pointer; transition: background 0.3s; }
    button:hover { background: #5a67d8; }
    .hint { background: #edf2f7; padding: 15px; border-radius: 5px; margin-top: 20px; font-size: 0.9em; color: #4a5568; }
  </style>
</head>
<body>
<div class="container">
  <h1><i class="fas fa-upload"></i> Upload & Protect Files (Sender)</h1>
  <form method="post" enctype="multipart/form-data">
    <label for="files"><i class="fas fa-file"></i> Files: <input type="file" id="files" name="files" multiple required aria-describedby="files-hint"></label>
    <label for="pin"><i class="fas fa-lock"></i> PIN (share this with receiver): <input type="password" id="pin" name="pin" required></label>
    <label for="ttl_hours"><i class="fas fa-clock"></i> Link TTL (hours): <input type="number" id="ttl_hours" name="ttl_hours" value="24" min="1"></label>
    <label class="checkbox-label"><input type="checkbox" name="one_time"> <i class="fas fa-trash"></i> One-time download (delete after successful download)</label>
    <button type="submit"><i class="fas fa-paper-plane"></i> Upload & Create Link</button>
  </form>
  <p class="hint" id="files-hint"><i class="fas fa-info-circle"></i> Files are encrypted using a key derived from the PIN. The server stores only encrypted blobs.</p>
</div>
</body>
</html>
